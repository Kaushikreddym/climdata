dwd:
  # Explore module metadata
  explore:
    full_name: Deutscher Wetterdienst (German Weather Service)
    type: Observation (Station)
    coverage: Germany
    resolution: station-based
    frequency: daily / hourly
    time_range: varies by station
    source: wetterdienst library
    notes: Retrieves the nearest station(s) to a given coordinate.
  
  # Data access configuration
  type: in-situ 
  subsetting: None
  variables:
    tas: 
      resolution: daily
      dataset: climate_summary
      name: temperature_air_mean_2m
      unit: degC
    tasmax:
      resolution: daily
      dataset: climate_summary
      name: temperature_air_max_2m
      unit: degC
    tasmin:
      resolution: daily
      dataset: climate_summary
      name: temperature_air_min_2m
      unit: degC
    pr:
      resolution: daily
      dataset: climate_summary
      name: precipitation_height
      unit: mm d-1
    rsds:
      resolution: daily
      dataset: solar
      name: radiation_sky_short_wave_diffuse
      unit: J/cm2
    sfcWind:
      resolution: daily
      dataset: climate_summary
      name: wind_speed
      unit: m/s
    hurs:
      resolution: daily
      dataset: climate_summary
      name: humidity
      unit: "%"
