mswx:
  # Explore module metadata
  explore:
    full_name: Multi-Source Weather – GloH2O
    type: Observation
    coverage: Global
    resolution: 0.1°
    frequency: daily
    time_range: 1979-01-01 to present
    source: Google Drive
    notes: Fetched via Google Drive API; supply a service-account JSON.
  
  # Data access configuration
  type: image
  subsetting: None
  license: "CC BY-NC 4.0 (Non-Commercial Use Only)"
  access_url: "https://www.gloh2o.org/mswx/"
  description: "Multi-Source Weather (MSWX) - Global, daily, 0.1° meteorological dataset based on ERA5, bias-corrected with station observations."
  usage_restrictions: "Non-commercial research, academic studies, personal projects, and non-profit applications only. Commercial use is prohibited."
  params:
    google_service_account: None
  variables:
    tasmin:
      name: air_temperature
      long_name: Daily Minimum Air Temperature
      basd_unit: K
      folder_id: 1_h0hgJThJLXhVOk905IJ7EFpkFV5KDSC
    tasmax:
      name: air_temperature
      long_name: Daily Maximum Air Temperature
      basd_unit: K
      folder_id: 1BKvHhO1JsBKKzMPCbzl5UpvqpRXHTj9c
    tas:
      name: air_temperature
      long_name: Mean Air Temperature
      basd_unit: K
      folder_id: 10l3ThTEkabK0yfk7DvpEcNgXkhbF9NNt
    pr:
      name: precipitation
      long_name: Precipitation
      basd_unit: kg m-2 s-1
      folder_id: 1gWoZ2bK2u5osJ8Iw-dvguZ56Kmz2QWrL
    rsds:
      name: downward_shortwave_radiation
      long_name: Surface Downwelling Shortwave Radiation
      basd_unit: W m-2
      folder_id: 1usXbIOi4_jBUdDaZbzPKXznx9PTYzHRv
    hurs:
      name: relative_humidity
      long_name: Relative Humidity
      basd_unit: "%"
      folder_id: 1EcBx7pdD23P7G2V8-HDrk0Sr7uJm9uvc
    sfcWind:
      name: wind_speed
      long_name: Wind Speed
      basd_unit: m s-1
      folder_id: 1ZaL1-1SitnlovSdnYdbNecC0dnlN3Qou
hyras:
  # Explore module metadata
  explore:
    full_name: Hydrologische Rasterdaten (DWD Gridded)
    type: Observation (Gridded)
    coverage: Germany
    resolution: 1 km
    frequency: daily
    time_range: 1951-01-01 to present
    source: DWD open-data server
    notes: High-resolution gridded climatology over Germany.
  
  # Data access configuration
  lat_dim: y
  lon_dim: x
  variables:
    tasmin:
      name: tasmin
      base_url: "https://opendata.dwd.de/climate_environment/CDC/grids_germany/daily/hyras_de/air_temperature_min/"
      prefix: "tasmin_hyras_1"
      version: "v6-0"
    tasmax:
      name: tasmax
      base_url: "https://opendata.dwd.de/climate_environment/CDC/grids_germany/daily/hyras_de/air_temperature_max/"
      prefix: "tasmax_hyras_1"
      version: "v6-0"
    tas:
      name: tas
      base_url: "https://opendata.dwd.de/climate_environment/CDC/grids_germany/daily/hyras_de/air_temperature_mean/"
      prefix: "tas_hyras_1"
      version: "v6-0"
    pr:
      name: pr
      base_url: "https://opendata.dwd.de/climate_environment/CDC/grids_germany/daily/hyras_de/precipitation/"
      prefix: "pr_hyras_1"
      version: "v6-0"
    rsds:
      name: rsds
      base_url: "https://opendata.dwd.de/climate_environment/CDC/grids_germany/daily/hyras_de/radiation_global/"
      prefix: "rsds_hyras_5"
      version: "v3-1"
    hurs:
      name: hurs
      base_url: "https://opendata.dwd.de/climate_environment/CDC/grids_germany/daily/hyras_de/humidity/"
      prefix: "hurs_hyras_1"
      version: "v6-0"
cmip:
  # Explore module metadata
  explore:
    full_name: CMIP6 via Pangeo Cloud Catalog
    type: ESM (Raw)
    coverage: Global
    resolution: model-dependent (~1°)
    frequency: daily
    time_range: 1850-01-01 to 2100-12-31
    source: Google Cloud Storage / Pangeo (intake-esm)
    notes: Requires internet; queries Pangeo CMIP6 JSON catalogue.
  
  # Data access configuration
  experiment_id: historical
  source_id: MIROC6
  table_id: day
  variables:
    tas:
      name: air_temperature
      long_name: Near-Surface Air Temperature
      units: K
      basd_unit: K

    tasmax:
      name: air_temperature_maximum
      long_name: Daily Maximum Near-Surface Air Temperature
      units: K
      basd_unit: K

    tasmin:
      name: air_temperature_minimum
      long_name: Daily Minimum Near-Surface Air Temperature
      units: K
      basd_unit: K

    rsds:
      name: surface_downwelling_shortwave_flux_in_air
      long_name: Surface Downwelling Shortwave Radiation
      units: W m-2
      basd_unit: W m-2

    sfcWind:
      name: wind_speed
      long_name: Near-Surface Wind Speed
      units: m s-1
      basd_unit: m s-1

    pr:
      name: precipitation_flux
      long_name: Precipitation
      units: kg m-2 s-1
      basd_unit: kg m-2 s-1
power:
  # Explore module metadata
  explore:
    full_name: NASA POWER Agroclimatology
    type: Observation (Reanalysis-derived)
    coverage: Global
    resolution: point / 0.5°
    frequency: daily
    time_range: 1981-01-01 to present
    source: NASA POWER REST API
    notes: Point queries; no credentials required.
  
  # Data access configuration
  community: AG
  temporal_resolution: daily

  variables:
    tas:
      api_id: T2M
      name: air_temperature
      long_name: Near-Surface Air Temperature (2m)
      units: degC
      basd_unit: K
      basd_note: "Convert °C → K before BASD (+ 273.15)."

    tasmax:
      api_id: T2M_MAX
      name: air_temperature_maximum
      long_name: Daily Maximum 2m Air Temperature
      units: degC
      basd_unit: K
      basd_note: "Convert °C → K before BASD (+ 273.15)."

    tasmin:
      api_id: T2M_MIN
      name: air_temperature_minimum
      long_name: Daily Minimum 2m Air Temperature
      units: degC
      basd_unit: K
      basd_note: "Convert °C → K before BASD (+ 273.15)."

    rsds:
      api_id: ALLSKY_SFC_SW_DWN
      name: surface_downwelling_shortwave_flux_in_air
      long_name: Surface Downwelling Shortwave Radiation
      units: MJ m-2 d-1
      basd_unit: W m-2
      basd_note: "Convert MJ m⁻² day⁻¹ → W m⁻² before BASD (÷ 0.0864)."

    sfcWind:
      api_id: WS2M
      name: wind_speed
      long_name: 2m Wind Speed
      units: m s-1
      basd_unit: m s-1

    pr:
      api_id: PRECTOTCORR
      name: precipitation_flux
      long_name: Precipitation (Corrected Total)
      units: mm d-1
      basd_unit: kg m-2 s-1
      basd_note: "Convert mm/day → kg m⁻² s⁻¹ before BASD (÷ 86400)."

