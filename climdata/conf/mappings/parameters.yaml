w5e5:
  # Explore module metadata
  explore:
    full_name: WFDE5 over Land merged with ERA5 over Ocean
    type: Observation
    coverage: Global
    resolution: 0.5°
    frequency: daily
    time_range: 1979-01-01 to 2019-12-31
    source: ISIMIP repository (isimip-client)
    notes: Reference dataset for ISIMIP3b bias adjustment.
  
  # Data access configuration
  type: gridded
  subsetting: None
  params:
    simulation_round: ISIMIP3a
    product: InputData
    climate_forcing: w5e5v2.0
    climate_scenario: obsclim
    resolution: 0.5deg
  variables:
    tas:
      name: tas
      long_name: Near-Surface Air Temperature
      units: K
      basd_unit: K
    tasmax:
      name: tasmax
      long_name: Daily Maximum Near-Surface Air Temperature
      units: K
      basd_unit: K
    tasmin:
      name: tasmin
      long_name: Daily Minimum Near-Surface Air Temperature
      units: K
      basd_unit: K
    pr:
      name: pr
      long_name: Precipitation
      units: kg m-2 s-1
      basd_unit: kg m-2 s-1
    rsds:
      name: rsds
      long_name: Surface Downwelling Shortwave Radiation
      units: W m-2
      basd_unit: W m-2
    rlds:
      name: rlds
      long_name: Surface Downwelling Longwave Radiation
      units: W m-2
      basd_unit: W m-2
    hurs:
      name: hurs
      long_name: Near-Surface Relative Humidity
      units: "%"
      basd_unit: "%"
    sfcWind:
      name: sfcwind
      long_name: Near-Surface Wind Speed
      units: m s-1
      basd_unit: m s-1
    ps:
      name: ps
      long_name: Surface Air Pressure
      units: Pa
      basd_unit: Pa
    huss:
      name: huss
      long_name: Near-Surface Specific Humidity
      units: "1"
      basd_unit: kg kg-1
  Description: "Observed atmospheric climate. Version 2.0 of the W5E5 dataset covers the entire globe at 0.5° horizontal and daily temporal resolution from 1979 to 2019. The W5E5 dataset was compiled to support the bias adjustment of climate input data for the impact assessments carried out in phase 3b of the Inter-Sectoral Impact Model Intercomparison Project (ISIMIP3b)."
cmip_w5e5:
  # Explore module metadata
  explore:
    full_name: CMIP6 corrected based on W5E5 (ISIMIP3BASD)
    type: ESM (Bias-Corrected)
    coverage: Global
    resolution: 0.5°
    frequency: daily
    time_range: 1850-01-01 to 2100-12-31
    source: ISIMIP repository (isimip-client)
    notes: Bias-adjusted & statistically downscaled by ISIMIP3b protocol.
  
  # Data access configuration
  type: gridded
  subsetting: None
  params:
    simulation_round: ISIMIP3b
    product: SecondaryInputData
    resolution: 0.5deg
  experiment_id: ssp585
  source_id: gfdl-esm4
  member_id: r1i1p1f1
  variables:
    tas:
      name: tas
      long_name: Near-Surface Air Temperature
      units: K
      basd_unit: K
    tasmax:
      name: tasmax
      long_name: Daily Maximum Near-Surface Air Temperature
      units: K
      basd_unit: K
    tasmin:
      name: tasmin
      long_name: Daily Minimum Near-Surface Air Temperature
      units: K
      basd_unit: K
    pr:
      name: pr
      long_name: Precipitation
      units: kg m-2 s-1
      basd_unit: kg m-2 s-1
    rsds:
      name: rsds
      long_name: Surface Downwelling Shortwave Radiation
      units: W m-2
      basd_unit: W m-2
    rlds:
      name: rlds
      long_name: Surface Downwelling Longwave Radiation
      units: W m-2
      basd_unit: W m-2
    hurs:
      name: hurs
      long_name: Near-Surface Relative Humidity
      units: "%"
      basd_unit: "%"
    sfcWind:
      name: sfcwind
      long_name: Near-Surface Wind Speed
      units: m s-1
      basd_unit: m s-1
    ps:
      name: ps
      long_name: Surface Air Pressure
      units: Pa
      basd_unit: Pa
    psl:
      name: psl
